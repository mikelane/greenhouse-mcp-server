name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src --strict

  mutation:
    name: mutation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Run mutation testing
        run: uv run pytest --gremlins --gremlin-report=json --gremlin-parallel --gremlin-cache -o "addopts="
      - name: Ratchet check
        run: |
          SCORE=$(python3 -c "import json; r=json.load(open('.gremlin-report.json')); print(round(r['zapped']/(r['zapped']+r['survived'])*100, 1) if r['zapped']+r['survived']>0 else 100)")
          THRESHOLD=$(cat .gremlins-score 2>/dev/null || echo 0)
          echo "Mutation score: ${SCORE}% (threshold: ${THRESHOLD}%)"
          python3 -c "import sys; sys.exit(0 if float('${SCORE}') >= float('${THRESHOLD}') else 1)"

  bdd:
    name: bdd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: BDD tests (stub)
        run: echo "BDD tests not yet implemented -- skipping"

  all-pass:
    name: all-pass
    runs-on: ubuntu-latest
    needs: [test, lint, mutation, bdd]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
