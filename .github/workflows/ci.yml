name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src --strict

  mutation:
    name: mutation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python 3.14
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Run mutation testing
        uses: mikelane/pytest-gremlins-action@v1
        with:
          command-prefix: 'uv run'
          skip-install: 'true'
          parallel: 'true'
          cache: 'true'
          ratchet-file: '.gremlins-score'
          pr-comment: 'true'

  bdd:
    name: bdd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: BDD tests (stub)
        run: echo "BDD tests not yet implemented -- skipping"

  all-pass:
    name: all-pass
    runs-on: ubuntu-latest
    needs: [test, lint, mutation, bdd]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
